<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>JeenaFlix — Premium OTT Streaming</title>
<meta name="description" content="JeenaFlix premium OTT streaming — Movies, TV Series, Live TV." />
<link rel="icon" href="https://www.jeenaflix.com/DOC-20260325-WA0063..png" />
<link rel="preconnect" href="http://zooox.top:8080" crossorigin>
<link rel="dns-prefetch" href="http://zooox.top:8080">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js" defer></script>
<style>
:root{
  --bg:#08090d; --bg2:#0e1016; --card:#15171f; --soft:#1c1f2a;
  --text:#f5f6fa; --muted:#9aa0ad; --red:#e50914; --red2:#ff2d3a;
  --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-thumb{background:#2a2d38;border-radius:8px}

/* Top Bar */
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(8,9,13,.95),rgba(8,9,13,.7) 80%,transparent);backdrop-filter:blur(12px);padding:12px 18px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;flex-shrink:0;min-width:0}
.logo img{width:38px;height:38px;border-radius:10px;object-fit:cover;flex-shrink:0}
.logo span{white-space:nowrap}
.logo .r{color:var(--red2)}
.search{flex:1;min-width:0;display:flex;align-items:center;background:var(--soft);border-radius:30px;padding:8px 14px;max-width:520px;margin-left:auto}
.search input{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--text);font-size:14px;margin-left:8px}
.search svg{width:18px;height:18px;opacity:.7;flex-shrink:0}
.search-toggle{display:none;width:40px;height:40px;border-radius:50%;background:var(--soft);align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}
.search-toggle svg{width:18px;height:18px}
@media (max-width:520px){
  .topbar{padding:10px 14px;gap:10px}
  .logo{font-size:18px;gap:8px}
  .logo img{width:32px;height:32px;border-radius:8px}
  .search{display:none;position:absolute;top:64px;left:12px;right:12px;max-width:none;margin:0;z-index:55;box-shadow:var(--shadow)}
  .search.open{display:flex}
  .search-toggle{display:flex}
  .search-results{top:118px}
}

/* Layout */
main{padding:0 0 110px 0;min-height:100vh}
.section{padding:22px 18px 6px;content-visibility:auto;contain-intrinsic-size:340px}
.section h2{font-size:18px;margin:0 0 12px;font-weight:700;letter-spacing:.3px}
.row{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;scroll-snap-type:x mandatory}
.row::-webkit-scrollbar{display:none}
.card{flex:0 0 auto;width:140px;border-radius:12px;overflow:hidden;background:var(--card);position:relative;cursor:pointer;transition:transform .25s ease, box-shadow .25s ease;scroll-snap-align:start;contain:content}
.card:hover{transform:translateY(-4px) scale(1.03);box-shadow:var(--shadow);z-index:2}
.card .poster{width:100%;aspect-ratio:2/3;background:#1a1c25 center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#3a3d48;font-size:30px;font-weight:800}
.card.live .poster{aspect-ratio:16/10;background-color:#11131a}
.card .meta{padding:8px 10px}
.card .meta .t{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:10px;padding:3px 7px;border-radius:6px;font-weight:700;letter-spacing:.5px}

/* Hero */
.hero{position:relative;height:62vh;min-height:380px;margin:8px 18px 0;border-radius:18px;overflow:hidden;background:#101218}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55)}
.hero .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(8,9,13,.9) 100%),linear-gradient(90deg,rgba(8,9,13,.85),transparent 60%)}
.hero .inner{position:absolute;left:0;right:0;bottom:0;padding:24px 26px}
.hero h1{font-size:34px;margin:0 0 10px;font-weight:800;line-height:1.1;max-width:600px}
.hero p{max-width:560px;color:#d3d6df;font-size:14px;margin:0 0 18px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hero .actions{display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:30px;font-weight:700;font-size:14px;transition:transform .15s}
.btn:hover{transform:scale(1.05)}
.btn.play{background:#fff;color:#000}
.btn.info{background:rgba(255,255,255,.18);color:#fff;backdrop-filter:blur(8px)}

/* Grid view */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:18px}
.grid .card{width:100%}

/* Category chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 18px 4px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:8px 16px;background:var(--soft);border-radius:30px;font-size:13px;font-weight:600;color:#cfd2dc;cursor:pointer;white-space:nowrap;transition:all .2s}
.chip.active{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff}

/* Bottom Nav */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(14,16,22,.95);backdrop-filter:blur(20px);border-top:1px solid #1c1f2a;display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border-radius:10px;color:var(--muted);font-size:11px;font-weight:600;transition:color .2s}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--red2)}

/* Page system */
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Details modal (Netflix-style) */
.details{position:fixed;inset:0;z-index:80;background:var(--bg);overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.details.open{display:block;animation:slideUp .34s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.details .back{position:fixed;top:14px;right:14px;left:auto;width:38px;height:38px;border-radius:50%;background:rgba(10,10,12,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:6}
.dbanner{position:relative;width:100%;aspect-ratio:16/10;max-height:56vh;background-size:cover;background-position:center top;overflow:hidden}
.dbanner::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,9,13,.15) 0%,rgba(8,9,13,.05) 45%,var(--bg) 100%)}
.dbanner .bplay{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:50%;background:rgba(0,0,0,.35);border:2.5px solid var(--red2);display:flex;align-items:center;justify-content:center;z-index:3;cursor:pointer;transition:transform .15s ease,background .15s ease}
.dbanner .bplay:active{transform:translate(-50%,-50%) scale(.9)}
.dbanner .bplay svg{width:30px;height:30px;margin-left:3px}
.dl-alert{margin:-40px 16px 0;position:relative;z-index:4;background:linear-gradient(90deg,#c00812,#e50914);color:#fff;border-radius:12px;padding:14px 16px;display:none;align-items:center;gap:12px;font-weight:700;font-size:14px;box-shadow:0 8px 26px rgba(229,9,20,.35);animation:fadeIn .3s ease}
.dl-alert.show{display:flex}
.dl-alert svg{width:26px;height:26px;flex-shrink:0}
.details .body{padding:16px 16px 46px;position:relative;z-index:2}
.details h1{font-size:26px;margin:0 0 8px;font-weight:800;line-height:1.15}
.dmeta{display:flex;flex-wrap:wrap;align-items:center;gap:10px;font-size:13.5px;margin-bottom:14px;color:#d3d6df}
.dmeta .match{color:#46d369;font-weight:800}
.dmeta .tag{border:1px solid #4b4f5a;border-radius:4px;padding:1px 6px;font-size:11px;color:#c9ccd6}
.dlangs{display:flex;gap:18px;overflow-x:auto;padding:2px 0 14px;margin-bottom:6px;scrollbar-width:none}
.dlangs::-webkit-scrollbar{display:none}
.dlang{flex:0 0 auto;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;padding-bottom:4px;border-bottom:2px solid transparent;transition:color .18s ease,border-color .18s ease}
.dlang.active{color:#fff;border-bottom-color:var(--red2)}
.dbtns{display:flex;flex-direction:column;gap:12px;margin:6px 0 18px}
.dbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:6px;font-weight:800;font-size:16px;transition:transform .12s ease,opacity .15s ease}
.dbtn:active{transform:scale(.98)}
.dbtn.play{background:#fff;color:#000}
.dbtn.dl{background:#3a3d47;color:#fff}
.dbtn svg{width:22px;height:22px}
.ddesc{color:#e6e8ee;line-height:1.6;font-size:14.5px;margin-bottom:14px}
.dcast{color:var(--muted);font-size:13.5px;line-height:1.55;margin-bottom:22px}
.dcast b{color:#cfd2dc;font-weight:600}
.dactions{display:flex;gap:6px;margin-bottom:22px}
.dact{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;color:#cfd2dc;font-size:12px;font-weight:600;cursor:pointer;padding:6px 0;transition:opacity .15s}
.dact:active{opacity:.6}
.dact svg{width:26px;height:26px;stroke:#fff}
.dtabs{display:flex;gap:26px;border-bottom:1px solid #23262f;margin-bottom:18px;overflow-x:auto;scrollbar-width:none}
.dtabs::-webkit-scrollbar{display:none}
.dtab{position:relative;padding:12px 0;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:color .18s}
.dtab.active{color:#fff}
.dtab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;background:var(--red2);border-radius:3px}
.dpane{display:none;animation:fadeIn .28s ease}
.dpane.active{display:block}
.seasonpick{background:var(--soft);color:#fff;border:1px solid #2d313c;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;margin-bottom:14px;min-width:180px}
.details .actions{display:flex;gap:10px;margin-bottom:24px}
/* Coming soon modal */
.cs-mask{position:fixed;inset:0;z-index:300;background:rgba(4,5,8,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:26px;opacity:0;pointer-events:none;transition:opacity .22s ease}
.cs-mask.show{opacity:1;pointer-events:auto}
.cs-card{width:100%;max-width:340px;background:linear-gradient(160deg,#181b24,#101218);border:1px solid #262a35;border-radius:18px;padding:26px 22px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.6);transform:scale(.9);transition:transform .26s cubic-bezier(.2,.9,.3,1.2)}
.cs-mask.show .cs-card{transform:scale(1)}
.cs-icon{width:62px;height:62px;margin:0 auto 16px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ff2d3a,#b0060f);display:flex;align-items:center;justify-content:center;box-shadow:0 0 32px rgba(229,9,20,.5)}
.cs-icon svg{width:30px;height:30px;stroke:#fff}
.cs-card h3{margin:0 0 8px;font-size:20px;font-weight:800}
.cs-card p{margin:0 0 20px;color:var(--muted);font-size:14px;line-height:1.55}
.cs-card button{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;border:none;border-radius:10px;padding:12px 30px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.cs-card button:active{transform:scale(.97)}

/* Netflix-style Player */
.player{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;contain:strict}
.player.open{display:flex}
.player video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
.player .pcontrols{position:absolute;inset:0;z-index:12;display:flex;flex-direction:column;justify-content:space-between;padding:20px 26px calc(20px + env(safe-area-inset-bottom));opacity:1;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.82) 0%,rgba(0,0,0,.4) 14%,transparent 30%,transparent 62%,rgba(0,0,0,.55) 82%,rgba(0,0,0,.92) 100%);transition:opacity .25s cubic-bezier(.4,0,.2,1);will-change:opacity}
.player.ui-hidden .pcontrols{opacity:0;pointer-events:none}
.player.locked .pcontrols{opacity:0;pointer-events:none}
.player .ptop,.player .pbottom,.player .center-row{pointer-events:auto}
.player .ptop{display:flex;align-items:center;gap:10px}
.player .ptop .ptitle-top{flex:1;min-width:0;font-weight:800;font-size:19px;letter-spacing:.15px;text-shadow:0 2px 8px rgba(0,0,0,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;color:#fff}
.player .ptop .ptop-right{display:flex;gap:2px;flex-shrink:0}
.player .pbtn{width:42px;height:42px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;transition:background .15s ease,transform .1s ease;border:0;color:#fff;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.player .pbtn:hover{background:rgba(255,255,255,.15)}
.player .pbtn:active{transform:scale(.9);background:rgba(255,255,255,.22)}
.player .pbtn svg{width:24px;height:24px;pointer-events:none}
.player .center-row{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:56px;z-index:15}
.player.ui-hidden .ptop,.player.ui-hidden .pbottom,.player.ui-hidden .center-row{pointer-events:none}
.player .center-btn{position:relative;width:56px;height:56px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;transition:background .15s ease,transform .1s ease;border:0;color:#fff;cursor:pointer;touch-action:manipulation}
.player .center-btn:hover{background:rgba(255,255,255,.12)}
.player .center-btn:active{transform:scale(.86)}
.player .center-btn.big{width:78px;height:78px}
.player .center-btn svg{width:38px;height:38px;pointer-events:none}
.player .center-btn.big svg{width:56px;height:56px}
.player .center-btn .n10{position:absolute;top:50%;left:50%;transform:translate(-50%,-38%);font-size:11px;font-weight:800;pointer-events:none;letter-spacing:.5px}
.player .pbottom{display:flex;flex-direction:column;gap:6px}
.player .seek{height:22px;width:100%;position:relative;cursor:pointer;touch-action:none;display:flex;align-items:center;z-index:20}
.player .seek::before{content:"";position:absolute;left:0;right:0;top:50%;height:4px;transform:translateY(-50%);background:rgba(255,255,255,.3);border-radius:999px;transition:height .15s cubic-bezier(.4,0,.2,1)}
.player .seek:hover::before,.player .seek.dragging::before{height:6px}
.player .seek .buf{position:absolute;left:0;top:50%;height:4px;transform:translateY(-50%);background:rgba(255,255,255,.45);border-radius:999px;width:0;pointer-events:none;transition:height .15s cubic-bezier(.4,0,.2,1)}
.player .seek:hover .buf,.player .seek.dragging .buf{height:6px}
.player .seek .fill{position:absolute;left:0;top:50%;height:4px;transform:translateY(-50%);background:#e50914;border-radius:999px;width:0;pointer-events:none;transition:height .15s cubic-bezier(.4,0,.2,1)}
.player .seek:hover .fill,.player .seek.dragging .fill{height:6px}
.player .seek .thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%) scale(0);width:15px;height:15px;background:#e50914;border-radius:50%;box-shadow:0 0 0 4px rgba(229,9,20,.25);transition:transform .15s cubic-bezier(.4,0,.2,1);pointer-events:none}
.player .seek:hover .thumb,.player .seek.dragging .thumb{transform:translate(-50%,-50%) scale(1)}
.player .seek.dragging .thumb{transform:translate(-50%,-50%) scale(1.4)}
.player .prow{display:flex;align-items:center;gap:4px;width:100%;padding-top:2px}
.player .pleft{display:flex;align-items:center;gap:2px;flex-shrink:0}
.player .pright{display:flex;align-items:center;gap:2px;margin-left:auto;flex-shrink:0}
.player .time{font-size:13px;color:#fff;font-variant-numeric:tabular-nums;text-shadow:0 1px 3px rgba(0,0,0,.75);white-space:nowrap;margin:0 10px;font-weight:600;letter-spacing:.3px}
.player .vol-wrap{display:flex;align-items:center;gap:4px}
.player .vol-slider{width:0;height:22px;border-radius:999px;cursor:pointer;position:relative;transition:width .22s cubic-bezier(.4,0,.2,1);touch-action:none;overflow:visible}
.player .vol-slider::before{content:"";position:absolute;left:0;right:0;top:50%;height:3px;transform:translateY(-50%);background:rgba(255,255,255,.28);border-radius:999px}
.player .vol-wrap:hover .vol-slider,.player .vol-wrap.active .vol-slider{width:88px;margin-right:6px}
.player .vol-fill{position:absolute;left:0;top:50%;height:3px;transform:translateY(-50%);background:#fff;border-radius:999px;width:100%;pointer-events:none}
.player .lock-fab{position:absolute;top:50%;left:16px;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);align-items:center;justify-content:center;z-index:25;display:none;border:0;color:#fff;touch-action:manipulation;cursor:pointer}
.player.locked .lock-fab{display:flex}
.player .tap-zones{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr 1fr;z-index:8;touch-action:none}
.player.locked .tap-zones{z-index:22}
.player .tap-zone{-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
.player .seek-ripple{position:absolute;top:0;bottom:0;width:38%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#fff;font-size:13px;font-weight:700;opacity:0;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,255,255,.18) 0%,rgba(255,255,255,.06) 42%,transparent 72%);z-index:18;text-shadow:0 1px 4px #000;transition:opacity .22s ease}
.player .seek-ripple.show{opacity:1}
.player .seek-ripple.left{left:0;border-top-right-radius:50%;border-bottom-right-radius:50%}
.player .seek-ripple.right{right:0;border-top-left-radius:50%;border-bottom-left-radius:50%}
.player .seek-ripple svg{width:34px;height:34px}
/* Netflix-style "Please wait" indicator (replaces circular spinner) */
.player .please-wait{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:15px;font-weight:600;letter-spacing:.4px;padding:10px 22px;background:rgba(0,0,0,.6);border-radius:26px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;z-index:30;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.7);animation:pw 1.4s ease-in-out infinite}
.player.loading .please-wait{display:block}
@keyframes pw{0%,100%{opacity:.75}50%{opacity:1}}
/* Netflix-style settings menu */
.psheet{position:absolute;right:20px;bottom:96px;background:rgba(20,20,20,.96);backdrop-filter:blur(20px);border-radius:6px;padding:6px 0;z-index:40;min-width:220px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.08)}
.psheet.open{display:block;animation:sheetIn .18s cubic-bezier(.4,0,.2,1)}
@keyframes sheetIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.psheet .row2{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:12px 18px;cursor:pointer;font-size:14px;font-weight:500;color:#fff;transition:background .12s}
.psheet .row2:hover{background:rgba(255,255,255,.08)}
.psheet .row2 span{color:#b3b3b3;font-weight:500;font-size:13px}
@media(max-width:680px){
  .player .pcontrols{padding:14px 14px calc(14px + env(safe-area-inset-bottom))}
  .player .pbtn{width:38px;height:38px}
  .player .pbtn svg{width:22px;height:22px}
  .player .ptop .ptitle-top{font-size:15px}
  .player .center-row{gap:38px}
  .player .center-btn{width:52px;height:52px}
  .player .center-btn.big{width:68px;height:68px}
  .player .center-btn svg{width:32px;height:32px}
  .player .center-btn.big svg{width:46px;height:46px}
  .player .time{font-size:12px;margin:0 6px}
  .player .pright .pbtn{width:36px;height:36px}
  .player .vol-wrap{display:none}
  .psheet{right:12px;bottom:88px;min-width:200px}
}

/* Search results */
.search-results{position:fixed;top:64px;left:18px;right:18px;background:#12141c;border-radius:14px;box-shadow:var(--shadow);max-height:60vh;overflow-y:auto;z-index:55;display:none}
.search-results.open{display:block}
.search-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #1c1f2a}
.search-item:hover{background:#1a1d27}

<script>

/* ====================== CLIENT HARDENING ====================== */
(function(){
  try{
    document.addEventListener('contextmenu', e=>{ e.preventDefault(); }, {capture:true});
    document.addEventListener('selectstart', e=>{
      var t=e.target; if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return;
      e.preventDefault();
    }, {capture:true});
    document.addEventListener('dragstart', e=>e.preventDefault(), {capture:true});
    document.addEventListener('copy', e=>{
      var t=e.target; if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return;
      e.preventDefault();
    });
    document.addEventListener('keydown', function(e){
      var k=e.key, c=e.ctrlKey||e.metaKey, s=e.shiftKey;
      if(k==='F12') { e.preventDefault(); return false; }
      if(c && s && (k==='I'||k==='i'||k==='J'||k==='j'||k==='C'||k==='c')) { e.preventDefault(); return false; }
      if(c && (k==='U'||k==='u'||k==='S'||k==='s')) { e.preventDefault(); return false; }
    }, {capture:true});
  }catch(_){}
})();

/* ====================== CONFIG ====================== */
/* credentials encoded (client-side obfuscation only) */
const _k=(function(){var a=[106,102,120,64,50,48,50,54,36,110,101,116,102,108,105,120,35,115,101,99,117,114,101];return String.fromCharCode.apply(null,a);})();
function _dx(b){try{var s=atob(b),o='';for(var i=0;i<s.length;i++)o+=String.fromCharCode(s.charCodeAt(i)^_k.charCodeAt(i%_k.length));return o;}catch(e){return '';}}
const XTREAM = Object.freeze({
  get server(){return _dx("EAkXL0oeRllUVF1EXlw=");},
  get user(){return _dx("DAcKNVlYAwQV");},
  get pass(){return _dx("WldJcgEABQQ=");},
  port: 80
});
const API_BASE = `http://${XTREAM.server}/player_api.php?username=${XTREAM.user}&password=${XTREAM.pass}`;
const STREAM_BASE = `http://${XTREAM.server}`;
// The Xtream origin sends Access-Control-Allow-Origin:* so we hit it directly.
// Proxies are only kept as an emergency fallback.
const PROXIES = [
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
];
function proxify(u){ return PROXIES[0](u); }
const _CACHE_TTL = 10*60*1000; // 10 min
function _cacheGet(k){ try{ const raw = localStorage.getItem('jf_c_'+k); if(!raw) return null; const o = JSON.parse(raw); if(Date.now()-o.t > _CACHE_TTL) return null; return o.d; }catch(e){ return null; } }
function _cacheSet(k, d){ try{ localStorage.setItem('jf_c_'+k, JSON.stringify({t:Date.now(),d})); }catch(e){} }
async function fetchJSON(url){
  const _ck = url.replace(/^.*action=/,'').replace(/[^a-z0-9_&=]/gi,'_').slice(0,120);
  const _cached = _cacheGet(_ck); if(_cached) return _cached;
  const errors = [];
  // 1) direct
  try{
    const ctrl = new AbortController();
    const to = setTimeout(()=>ctrl.abort(), 15000);
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(to);
    if(r.ok){
      const txt = await r.text();
      try { const j = JSON.parse(txt); _cacheSet(_ck, j); return j; } catch(e){ errors.push('parse'); }
    } else errors.push('direct '+r.status);
  }catch(e){ errors.push('direct '+String(e).slice(0,30)); }
  // 2) proxies fallback
  for (const p of PROXIES){
    try{
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(), 20000);
      const r = await fetch(p(url), {signal: ctrl.signal});
      clearTimeout(to);
      if(!r.ok){ errors.push('proxy '+r.status); continue; }
      const txt = await r.text();
      try { const j = JSON.parse(txt); _cacheSet(_ck, j); return j; } catch(e){ errors.push('parse'); continue; }
    }catch(e){ errors.push(String(e).slice(0,40)); }
  }
  throw new Error('Network failure ('+errors.join(', ')+')');
}

/* ====================== STATE ====================== */
let ALL = []; // all items
let MOVIES = [], SERIES = [], LIVE = [];
let CATS = { movies: [], series: [], live: [] };
let activeCat = { movies: 'All', series: 'All', live: 'All' };
let hls = null;
let lastTapTime = 0;
let CAT_MAP = { live:{}, vod:{}, series:{} }; // id -> name
let SERIES_INFO_CACHE = {};

/* ====================== XTREAM LOADER ====================== */
async function loadAll(){
  // 1) Categories in parallel (small)
  const [liveCats, vodCats, serCats] = await Promise.all([
    fetchJSON(`${API_BASE}&action=get_live_categories`),
    fetchJSON(`${API_BASE}&action=get_vod_categories`),
    fetchJSON(`${API_BASE}&action=get_series_categories`),
  ]);
  (liveCats||[]).forEach(c=> CAT_MAP.live[c.category_id]=c.category_name);
  (vodCats||[]).forEach(c=> CAT_MAP.vod[c.category_id]=c.category_name);
  (serCats||[]).forEach(c=> CAT_MAP.series[c.category_id]=c.category_name);

  // 2) Streams in parallel (larger; that's why proxy is critical)
  const [liveS, vodS, serS] = await Promise.all([
    fetchJSON(`${API_BASE}&action=get_live_streams`).catch(()=>[]),
    fetchJSON(`${API_BASE}&action=get_vod_streams`).catch(()=>[]),
    fetchJSON(`${API_BASE}&action=get_series`).catch(()=>[]),
  ]);

  const items = [];
  let id = 0;
  (liveS||[]).forEach(s=>{
    items.push({
      id: id++, kind:'live', name: s.name, logo: s.stream_icon||'',
      group: CAT_MAP.live[s.category_id] || 'Live TV',
      url: `${STREAM_BASE}/live/${XTREAM.user}/${XTREAM.pass}/${s.stream_id}.m3u8`,
      streamId: s.stream_id,
    });
  });
  (vodS||[]).forEach(s=>{
    const ext = s.container_extension || 'mp4';
    items.push({
      id: id++, kind:'movie', name: s.name, logo: s.stream_icon||'',
      group: CAT_MAP.vod[s.category_id] || 'Movies',
      url: `${STREAM_BASE}/movie/${XTREAM.user}/${XTREAM.pass}/${s.stream_id}.${ext}`,
      streamId: s.stream_id, ext,
      rating: s.rating, year: s.year, plot: s.plot,
    });
  });
  (serS||[]).forEach(s=>{
    items.push({
      id: id++, kind:'series', name: s.name, logo: s.cover||'',
      group: CAT_MAP.series[s.category_id] || 'Series',
      url: '', // resolved on play via get_series_info
      seriesId: s.series_id,
      plot: s.plot, rating: s.rating, year: s.releaseDate,
    });
  });
  return items;
}

async function resolveSeriesFirstEpisode(item){
  if(item.url) return item.url;
  const info = SERIES_INFO_CACHE[item.seriesId] ||
    (SERIES_INFO_CACHE[item.seriesId] = await fetchJSON(`${API_BASE}&action=get_series_info&series_id=${item.seriesId}`));
  const eps = info && info.episodes;
  if(!eps) return '';
  const firstSeason = Object.keys(eps).sort((a,b)=>+a-+b)[0];
  const ep = eps[firstSeason] && eps[firstSeason][0];
  if(!ep) return '';
  const ext = ep.container_extension || 'mp4';
  return `${STREAM_BASE}/series/${XTREAM.user}/${XTREAM.pass}/${ep.id}.${ext}`;
}

/* ====================== INIT ====================== */
let splashHidden = false;
async function init(){
  try{
    ALL = await loadAll();
    if(!ALL.length) throw new Error('Server returned no items');
    MOVIES = ALL.filter(x=>x.kind==='movie');
    SERIES = ALL.filter(x=>x.kind==='series');
    LIVE = ALL.filter(x=>x.kind==='live');

    CATS.movies = ['All', ...uniq(MOVIES.map(x=>x.group))];
    CATS.series = ['All', ...uniq(SERIES.map(x=>x.group))];
    CATS.live   = ['All', ...uniq(LIVE.map(x=>x.group))];

    buildHome();
    buildChips('movieChips', CATS.movies, 'movies');
    buildChips('seriesChips', CATS.series, 'series');
    buildChips('liveChips', CATS.live, 'live');
    renderGrid('movies'); renderGrid('series'); renderGrid('live');
  }catch(e){
    const el = document.getElementById('homeRows');
    if(el) el.innerHTML = `<div class="empty">⚠️ ${e.message}<br/><br/><button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;background:#e50914;color:#fff;border:0;border-radius:8px;cursor:pointer">Retry</button></div>`;
  }
  hideSplash();
}
const uniq = a => [...new Set(a.filter(Boolean))];

function hideSplash(){
  if(splashHidden) return; splashHidden = true;
  const s = document.getElementById('splash');
  if(!s) return;
  s.classList.add('hide');
  setTimeout(()=>s.remove(), 600);
}

/* ====================== RENDER ====================== */
function imgFor(item){
  if(item.logo) return item.logo;
  return '';
}
function cardHTML(item, live=false){
  const bg = imgFor(item);
  const initial = (item.name||'?').trim().charAt(0).toUpperCase();
  return `<div class="card ${live?'live':''}" onclick="openDetails(${item.id})">
    ${live?'<div class="badge">LIVE</div>':''}
    <div class="poster" ${bg?`data-bg="${escapeAttr(bg)}"`:''}>${bg?'':initial}</div>
    <div class="meta"><div class="t">${escapeHTML(item.name)}</div></div>
  </div>`;
}
// Lazy load posters via IntersectionObserver — massive perf win vs eager loads.
const _lazyBg = ('IntersectionObserver' in window) ? new IntersectionObserver((entries)=>{
  for(const e of entries){
    if(e.isIntersecting){
      const el = e.target, u = el.getAttribute('data-bg');
      if(u){ el.style.backgroundImage = `url('${u}')`; el.removeAttribute('data-bg'); }
      _lazyBg.unobserve(el);
    }
  }
}, {rootMargin:'400px'}) : null;
function _scanLazy(root){
  if(!_lazyBg){ (root||document).querySelectorAll('.poster[data-bg]').forEach(el=>{ el.style.backgroundImage=`url('${el.getAttribute('data-bg')}')`; el.removeAttribute('data-bg'); }); return; }
  (root||document).querySelectorAll('.poster[data-bg]').forEach(el=>_lazyBg.observe(el));
}
const _mo = new MutationObserver(muts=>{ for(const m of muts) if(m.addedNodes.length) _scanLazy(document); });
_mo.observe(document.body, {childList:true, subtree:true});
function escapeHTML(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeAttr(s){return (s||'').replace(/'/g,"\\'")}

function buildHome(){
  const hostEl = document.getElementById('homeRows');
  hostEl.innerHTML = '';
  // Hero - pick a random movie with logo
  const heroPool = MOVIES.filter(m=>m.logo).slice(0,30);
  const hero = heroPool[Math.floor(Math.random()*heroPool.length)] || MOVIES[0] || ALL[0];
  if(hero){
    document.getElementById('heroMount').innerHTML = `
      <div class="hero">
        <div class="bg" style="background-image:url('${escapeAttr(hero.logo||'')}')"></div>
        <div class="grad"></div>
        <div class="inner">
          <h1>${escapeHTML(hero.name)}</h1>
          <p>${escapeHTML(hero.group)} — Stream now in premium quality on JeenaFlix.</p>
          <div class="actions">
            <button class="btn play" onclick="playItem(${hero.id})">▶ Play</button>
            <button class="btn info" onclick="openDetails(${hero.id})">ⓘ More Info</button>
          </div>
        </div>
      </div>`;
  }
  // Trending = random sample
  const trending = sample(ALL, 18);
  const recent = ALL.slice(-18).reverse();
  const popMov = sample(MOVIES, 18);
  const popSer = sample(SERIES, 18);
  const liveSel = sample(LIVE, 18);

  const sections = [
    {title:'🔥 Trending Now', items: trending, live:false},
    {title:'🆕 Recently Added', items: recent, live:false},
    {title:'🎬 Popular Movies', items: popMov, live:false},
    {title:'📺 Popular Series', items: popSer, live:false},
    {title:'📡 Live TV', items: liveSel, live:true},
  ];
  // Category rows from playlist groups
  const groups = uniq(ALL.map(x=>x.group)).slice(0,12);
  groups.forEach(g=>{
    const items = ALL.filter(x=>x.group===g).slice(0,18);
    if(items.length>2) sections.push({title:g, items, live:items[0].kind==='live'});
  });

  const _ric = window.requestIdleCallback || (cb=>setTimeout(cb,1));
  let _i = 0;
  function _renderNext(){
    if(_i >= sections.length) return;
    const s = sections[_i++];
    if(s.items.length){
      const html = `<div class="section"><h2>${escapeHTML(s.title)}</h2>
        <div class="row">${s.items.map(i=>cardHTML(i,s.live)).join('')}</div></div>`;
      hostEl.insertAdjacentHTML('beforeend', html);
    }
    _ric(_renderNext);
  }
  // render first 2 rows immediately; rest during idle time
  for(let k=0;k<2 && _i<sections.length;k++){
    const s = sections[_i++];
    if(!s.items.length) continue;
    const html = `<div class="section"><h2>${escapeHTML(s.title)}</h2>
      <div class="row">${s.items.map(i=>cardHTML(i,s.live)).join('')}</div></div>`;
    hostEl.insertAdjacentHTML('beforeend', html);
  }
  _ric(_renderNext);
}
function sample(arr, n){
  const a = arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a.slice(0,n);
}

/* ====================== LANGUAGE VARIANTS ====================== */
const LANG_WORDS = ['hindi','english','tamil','telugu','malayalam','kannada','bengali','marathi','punjabi','gujarati','urdu','spanish','french','german','italian','portuguese','russian','japanese','korean','chinese','arabic','turkish','czech','dutch','polish','thai','indonesian','dual audio','dual'];
function normBase(name){
  let s=(name||'').toLowerCase();
  s=s.replace(/\([^)]*\)|\[[^\]]*\]|\{[^}]*\}/g,' ');
  s=s.replace(/\b(19|20)\d{2}\b/g,' ');
  s=s.replace(/\b(4k|2160p|1080p|720p|480p|hd|sd|hq|hevc|x264|x265|web-?dl|bluray|hdrip|multi|org|esub|esubs)\b/gi,' ');
  LANG_WORDS.forEach(w=>{ s=s.replace(new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','g'),' '); });
  s=s.replace(/[^a-z0-9]+/g,' ').trim();
  return s;
}
function detectLang(name){
  const s=(name||'').toLowerCase();
  for(const w of LANG_WORDS){ if(new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(s)) return w.split(' ')[0].replace(/^\w/,c=>c.toUpperCase()); }
  return '';
}
function buildLangVariants(item){
  if(item.kind==='series') return [];
  const base=normBase(item.name);
  if(!base||base.length<2) return [];
  const map=new Map();
  ALL.forEach(x=>{
    if(x.kind!==item.kind) return;
    if(normBase(x.name)!==base) return;
    const lang=detectLang(x.name)|| (x.id===item.id?'Original':'');
    const key=lang||('v'+x.id);
    if(!map.has(key)) map.set(key,{id:x.id,lang:lang||'Original'});
  });
  const arr=[...map.values()];
  return arr.length>1?arr:[];
}

let currentLevel = -1;

let hideControlsLocked = false;

async function playItem(id){
  const item = ALL[id]; if(!item) return;
  currentItemId = id;
  document.getElementById('ptitle').textContent = item.name || '';
  closeDetails();
  playerEl.classList.add('open','loading');
  playerEl.classList.remove('locked','ui-hidden');
  showControls(true);
  resetPlayerUi();

  const saved = parseFloat(localStorage.getItem('jf_resume_'+id)||'0');

  destroyHls();
  video.pause();
  video.removeAttribute('src');
  video.load();

  let url = item.url;
  if(item.kind==='series' && !url){
    try{ url = await resolveSeriesFirstEpisode(item); item.url = url; }
    catch(e){ showToast('Could not load episode'); playerEl.classList.remove('loading'); return; }
  }
  if(!url){ showToast('No stream URL'); playerEl.classList.remove('loading'); return; }

  const startWhenReady = ()=>{
    if(saved>5 && isFinite(video.duration) && saved < video.duration-8) video.currentTime = saved;
    video.play().then(()=>showControls()).catch(()=>showControls(true));
  };

  if(url.endsWith('.m3u8') || url.includes('.m3u8?')){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({
        autoStartLoad: true,
        lowLatencyMode: true,
        backBufferLength: 20,
        maxBufferLength: 18,
        maxMaxBufferLength: 30,
        maxBufferSize: 30*1000*1000,
        startLevel: -1,
        startFragPrefetch: true,
        progressive: true,
        testBandwidth: false,
        abrEwmaDefaultEstimate: 2200000,
        abrBandWidthFactor: 0.9,
        manifestLoadingTimeOut: 8000,
        manifestLoadingMaxRetry: 2,
        manifestLoadingRetryDelay: 500,
        levelLoadingTimeOut: 8000,
        levelLoadingMaxRetry: 2,
        fragLoadingTimeOut: 14000,
        fragLoadingMaxRetry: 4,
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        availableQualities = hls.levels || [];
        document.getElementById('qualityBtn').style.display = availableQualities.length>1?'flex':'none';
        startWhenReady();
      });
      hls.on(Hls.Events.ERROR, (_,d)=>{
        if(!d || !d.fatal) return;
        if(d.type === Hls.ErrorTypes.NETWORK_ERROR){ try{ hls.startLoad(); }catch(e){} }
        else if(d.type === Hls.ErrorTypes.MEDIA_ERROR){ try{ hls.recoverMediaError(); }catch(e){} }
        else { showToast('Stream error'); playerEl.classList.remove('loading'); }
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = url;
      video.addEventListener('loadedmetadata', startWhenReady, {once:true});
    } else {
      showToast('Stream not supported'); playerEl.classList.remove('loading');
    }
  } else {
    video.src = url;
    video.addEventListener('loadedmetadata', startWhenReady, {once:true});
    video.addEventListener('error', ()=>{
      if(video.src !== proxify(url)){ video.src = proxify(url); video.play().catch(()=>{}); }
    }, {once:true});
    document.getElementById('qualityBtn').style.display='none';
  }
}

function updatePP(playing){
  const svg = playing?'<svg viewBox="0 0 24 24" fill="#fff"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>':'<svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>';
  document.getElementById('ppBtn').innerHTML = svg;
  document.getElementById('centerPlay').innerHTML = svg;
}
function toggleLock(){
  playerEl.classList.toggle('locked');
  if(playerEl.classList.contains('locked')) playerEl.classList.add('ui-hidden');
  else showControls(true);
}
function toggleFullscreen(){
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  else playerEl.requestFullscreen?.().catch(()=>{});
  if(screen.orientation && screen.orientation.lock){ try{screen.orientation.lock('landscape')}catch(e){} }
  showControls(true);
}
function cycleQuality(){
  if(!hls||!availableQualities.length) return;
  currentLevel = currentLevel+1; if(currentLevel>=availableQualities.length) currentLevel=-1;
  hls.currentLevel = currentLevel;
  const txt = currentLevel===-1?'Auto':availableQualities[currentLevel].height+'p';
  var qv=document.getElementById('qualVal'); if(qv) qv.textContent=txt;
  showToast('Quality: '+txt);
  showControls(true);
}
let toastTimer;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.86);color:#fff;padding:10px 18px;border-radius:24px;z-index:220;font-size:13px;transition:opacity .25s;pointer-events:none';document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity=1; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity=0,1500);
}
function fmt(s){ if(!isFinite(s)) return '0:00'; s=Math.max(0,s); const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60); const mm=(m<10&&h?'0':'')+m, ss=(sec<10?'0':'')+sec; return h?h+':'+mm+':'+ss:m+':'+ss; }
function updateProgress(forcePct){
  const dur = isFinite(video.duration) ? video.duration : 0;
  const pct = typeof forcePct==='number' ? forcePct : (dur ? video.currentTime/dur*100 : 0);
  fillEl.style.width = Math.max(0, Math.min(100, pct))+'%';
  thumbEl.style.left = Math.max(0, Math.min(100, pct))+'%';
  timeEl.textContent = fmt(video.currentTime)+' / '+fmt(dur);
}
video.addEventListener('play', ()=>{updatePP(true);showControls();});
video.addEventListener('pause', ()=>{updatePP(false);showControls(true);});
video.addEventListener('waiting', ()=>playerEl.classList.add('loading'));
video.addEventListener('playing', ()=>playerEl.classList.remove('loading'));
video.addEventListener('canplay', ()=>playerEl.classList.remove('loading'));
video.addEventListener('timeupdate', ()=>{ if(!isSeeking) updateProgress(); });
video.addEventListener('loadedmetadata', updateProgress);
video.addEventListener('progress', ()=>{
  const dur = isFinite(video.duration) ? video.duration : 0;
  if(!dur || !video.buffered.length) return;
  try{ const end = video.buffered.end(video.buffered.length-1); bufEl.style.width = Math.max(0, Math.min(100, end/dur*100))+'%'; }catch(e){}
});
video.addEventListener('click', e=>e.preventDefault());
['touchstart','touchmove','wheel'].forEach(ev=>document.addEventListener(ev, function(){}, {passive:true}));

function seekToClientX(clientX, commit=true){
  const r = seekEl.getBoundingClientRect();
  const p = Math.max(0, Math.min(1, (clientX-r.left)/Math.max(1,r.width)));
  updateProgress(p*100);
  if(commit && isFinite(video.duration) && video.duration>0){ video.currentTime = p*video.duration; }
  return p;
}
seekEl.addEventListener('pointerdown', e=>{
  e.preventDefault(); e.stopPropagation();
  isSeeking = true; hideControlsLocked = true;
  seekEl.classList.add('dragging');
  seekEl.setPointerCapture?.(e.pointerId);
  seekToClientX(e.clientX, true);
  showControls(true);
});
seekEl.addEventListener('pointermove', e=>{
  if(!isSeeking) return;
  e.preventDefault(); e.stopPropagation();
  seekToClientX(e.clientX, true);
});
function finishSeek(e){
  if(!isSeeking) return;
  if(e){ e.preventDefault(); e.stopPropagation(); seekToClientX(e.clientX, true); }
  isSeeking = false; hideControlsLocked = false;
  seekEl.classList.remove('dragging');
  showControls(true);
}
seekEl.addEventListener('pointerup', finishSeek);
seekEl.addEventListener('pointercancel', finishSeek);

// YouTube-like tap layer: single tap shows/hides controls, double tap left/right seeks 10 seconds.
let tapTimer = null;
let tapLastTime = 0;
let tapLastSide = '';
document.querySelectorAll('#tapZones .tap-zone').forEach((zone, index)=>{
  const side = index===0 ? 'left' : index===2 ? 'right' : 'middle';
  zone.addEventListener('pointerdown', e=>{
    if(!playerEl.classList.contains('open')) return;
    if(playerEl.classList.contains('locked')){
      e.preventDefault(); e.stopPropagation();
      playerEl.classList.remove('locked');
      showControls(true);
      return;
    }
    e.preventDefault(); e.stopPropagation();
    const now = Date.now();
    const isDouble = now - tapLastTime < 330 && tapLastSide === side;
    clearTimeout(tapTimer);
    if(isDouble){
      if(side==='left') skip(-10);
      else if(side==='right') skip(10);
      else togglePlay();
      tapLastTime = 0; tapLastSide = '';
    } else {
      tapLastTime = now; tapLastSide = side;
      tapTimer = setTimeout(()=>{
        if(playerEl.classList.contains('ui-hidden')) showControls(true);
        else hideControlsNow();
        tapTimer = null;
      }, 230);
    }
  });
});

// Keyboard shortcuts
{
  document.addEventListener('keydown', e=>{
    if(!playerEl.classList.contains('open')) return;
    if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
    switch(e.key){
      case ' ': case 'k': case 'K': e.preventDefault(); togglePlay(); break;
      case 'ArrowLeft': case 'j': case 'J': e.preventDefault(); skip(-10); break;
      case 'ArrowRight': case 'l': case 'L': e.preventDefault(); skip(10); break;
      case 'ArrowUp': e.preventDefault(); setVolume(Math.min(1,video.volume+0.1)); break;
      case 'ArrowDown': e.preventDefault(); setVolume(Math.max(0,video.volume-0.1)); break;
      case 'f': case 'F': e.preventDefault(); toggleFullscreen(); break;
      case 'm': case 'M': e.preventDefault(); toggleMute(); break;
      case 'Escape': e.preventDefault(); historyBack(); break;
    }
  });
}

function showControls(keepVisible=false){
  if(!playerEl.classList.contains('open') || playerEl.classList.contains('locked')) return;
  playerEl.classList.remove('ui-hidden');
  clearTimeout(controlsTimer);
  if(keepVisible || video.paused || hideControlsLocked) return;
  controlsTimer = setTimeout(()=>hideControlsNow(), 3200);
}
function hideControlsNow(){
  if(playerEl.classList.contains('locked') || video.paused || hideControlsLocked) return;
  playerEl.classList.add('ui-hidden');
}
playerEl.addEventListener('pointermove', ()=>showControls());
controlsEl.addEventListener('pointerdown', e=>showControls(true));

/* ====================== VOLUME ====================== */
function setVolume(v){
  v = Math.max(0, Math.min(1, Number(v)||0));
  video.volume = v;
  video.muted = v===0;
  volFill.style.width = (v*100)+'%';
  updateMuteIcon();
  showControls(true);
}
function toggleMute(){
  video.muted = !video.muted;
  if(!video.muted && video.volume===0) video.volume = 0.5;
  volFill.style.width = ((video.muted?0:video.volume)*100)+'%';
  updateMuteIcon();
  showControls(true);
}
function updateMuteIcon(){
  const muted = video.muted || video.volume===0;
  document.getElementById('muteBtn').innerHTML = muted
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5zM22 9l-6 6M16 9l6 6"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5zM15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>';
}
let volumeDragging = false;
function volumeFromClientX(clientX){
  const r = volSlider.getBoundingClientRect();
  setVolume((clientX-r.left)/Math.max(1,r.width));
}
volSlider.addEventListener('pointerdown', e=>{
  e.preventDefault(); e.stopPropagation();
  volumeDragging = true; volWrap.classList.add('active'); volSlider.setPointerCapture?.(e.pointerId); volumeFromClientX(e.clientX);
});
volSlider.addEventListener('pointermove', e=>{ if(volumeDragging){ e.preventDefault(); e.stopPropagation(); volumeFromClientX(e.clientX); } });
function endVolume(e){ if(!volumeDragging) return; volumeDragging=false; volWrap.classList.remove('active'); if(e){e.preventDefault();e.stopPropagation();} }
volSlider.addEventListener('pointerup', endVolume);
volSlider.addEventListener('pointercancel', endVolume);
volFill.style.width='100%';
updateMuteIcon();

/* ====================== HISTORY / BACK BUTTON ====================== */
// Stack-based view manager: pushing a view adds a history entry; browser/Android
// back fires popstate which closes top view without leaving the site.
const viewStack = [];
function pushView(name){
  viewStack.push(name);
  history.pushState({jf:name, depth:viewStack.length}, '');
}
function historyBack(){
  if(viewStack.length) history.back();
  else closeAllOverlays();
}
function closeTopView(){
  const name = viewStack.pop();
  if(name==='player') _closePlayerNow();
  else if(name==='details') _closeDetailsNow();
}
function closeAllOverlays(){
  while(viewStack.length) closeTopView();
}
window.addEventListener('popstate', ()=>{
  if(viewStack.length) closeTopView();
});
// Anchor entry so the first back press from any overlay returns to the site,
// not to the previous browsing-history page.
if(!history.state || !history.state.jfAnchor){
  history.replaceState({jfAnchor:true}, '');
}

// Wrap open/close so they push/pop history
const _openDetails = openDetails;
window.openDetails = async function(id){
  await _openDetails(id);
  if(viewStack[viewStack.length-1] !== 'details') pushView('details');
};
const _closeDetailsOrig = closeDetails;
function _closeDetailsNow(){ _closeDetailsOrig(); }
window.closeDetails = function(){
  // user-triggered close: pop history so stack stays in sync
  if(viewStack[viewStack.length-1]==='details'){ history.back(); }
  else { _closeDetailsNow(); }
};

const _playItem = playItem;
window.playItem = async function(id){
  const hadDetails = viewStack[viewStack.length-1] === 'details';
  await _playItem(id);
  if(hadDetails) viewStack.pop();
  if(viewStack[viewStack.length-1] !== 'player') pushView('player');
};
function _closePlayerNow(){
  saveResume();
  video.pause(); destroyHls(); video.removeAttribute('src'); video.load();
  playerEl.classList.remove('open','loading','locked','ui-hidden');
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}
window.closePlayer = function(){
  if(viewStack[viewStack.length-1]==='player'){ history.back(); }
  else { _closePlayerNow(); }
};

// Auto next episode (sequential in series group)
video.addEventListener('ended', ()=>{
  if(currentItemId===null) return;
  const cur = ALL[currentItemId];
  if(cur.kind!=='series') return;
  const list = SERIES.filter(x=>x.group===cur.group);
  const idx = list.findIndex(x=>x.id===cur.id);
  if(idx>=0 && idx<list.length-1){
    showToast('Next episode...');
    setTimeout(()=>playItem(list[idx+1].id), 800);
  }
});

/* ====================== SETTINGS SHEET ====================== */
function toggleSettings(e){ if(e){e.stopPropagation();} const s=document.getElementById('psheet'); if(s) s.classList.toggle('open'); showControls(true); }
document.addEventListener('pointerdown', function(e){ const s=document.getElementById('psheet'); if(s&&s.classList.contains('open')&&!e.target.closest('#psheet')&&!(e.target.closest&&e.target.closest('[onclick*="toggleSettings"]'))) s.classList.remove('open'); }, true);

init();
</script>
